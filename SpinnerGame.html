<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="utf-8"/>
        <link rel="icon" href="data:,"/>
        <title>Sandbox</title>
    </head>
    <style>
        .button {
            background-color: #404040;
            color: lightgray;
            padding: 15px 32px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            transition: background-color 0.3s ease;
            display: none;
        }
        .button:hover {
            background-color: #606060; 
        }
        .button:active {
            background-color: #808080;
        }
        canvas {
            display: block;
            border: 1px solid black;
            margin: auto;
        }
        body {
            background-color: black;
        }
    </style>
    <body>
        <button id="button" class="button">Connect to Controller</button>
        <canvas id="canvas" width="350" height="640"></canvas>
    </body>
    <script>
        function drawKeyHole(c, l, s) {
            c.save();
            c.translate(l.x, l.y);

            let plugGradient = c.createRadialGradient(0, 0, 0, 0, 0, l.keyHoleRadius);
            
            plugGradient.addColorStop(0, "#f1c861");
            plugGradient.addColorStop(0.7, "#c9982f");
            plugGradient.addColorStop(1, "#7a5c1a");

            c.beginPath();
            c.arc(0, 0, l.plugRadius, 0, Math.PI * 2);
            c.fillStyle = plugGradient;
            c.fill();

            c.lineWidth = 1;
            c.strokeStyle = "#6f5724";
            c.stroke();

            // scratches

            c.strokeStyle = "rgba(0,0,0,0.1)";
            c.lineWidth = 1;
            
            l.plugScratchInfo.forEach(s => {
                c.beginPath();
                c.arc(0, 0, s.r, s.a, s.a + s.pa);
                c.stroke();
            });

            // outline of a key hole
            
            c.save();
            c.translate(-8, -38); // convert to percentage
            c.scale(0.7, 0.7)
            drawKeyPath(c, l);
            c.restore();

            c.restore();
        }

        function drawDial(c, li, s) {
            c.save();
            c.translate(li.x, li.y);
            
            // background
            let bgGradient = c.createRadialGradient(0, 0, 0, 0, 0, li.dialRadius);

            bgGradient.addColorStop(0, "#f6d57a");  // light brass
            bgGradient.addColorStop(0.5, "#d4a73b");
            bgGradient.addColorStop(1, "#8c6b1f");  // dark brass edge

            c.beginPath();
            c.arc(0, 0, li.dialRadius, 0, Math.PI * 2);
            c.fillStyle = bgGradient;
            c.fill();
            
            c.lineWidth = 1;
            c.strokeStyle = "#6f5418";
            c.stroke();

            // tick marks
            let tickCount = 12;

            c.save();
            c.rotate(s.tumblerAngle);
            
            for (let i = 0; i < tickCount; i++) {
                let tickAngle = (i / tickCount) * 2 * Math.PI;
                let innerRadius = li.keyHoleRadius - 8;
                let outerRadius = li.keyHoleRadius - 1;

                c.save();
                c.rotate(tickAngle);
                c.beginPath();
                c.moveTo(0, innerRadius);
                c.lineTo(0, outerRadius);
                c.strokeStyle = "#6e5418";
                c.lineWidth = 1;
                c.stroke();
                c.restore();
            }

            c.restore();
            c.restore();
        }

        function drawKeyPath(c, li) {
            c.beginPath();

            c.moveTo(0, 0);
            c.lineTo(15, 0);
            c.lineTo(15, 50);
            c.lineTo(25, 60);
            c.lineTo(25, 70);
            c.lineTo(15, 75);
            c.lineTo(15, 85);
            c.lineTo(25, 85);
            c.lineTo(25, 110);
            c.lineTo(0, 110);
            c.lineTo(0, 65);
            c.lineTo(5, 65);
            c.lineTo(5, 55);
            c.lineTo(0, 50);
            c.lineTo(0, 0);

            c.lineWidth = 2;
            c.strokeStyle = "black";
            c.stroke();

            c.fillStyle = "#1a1a1a";
            c.fill();

            c.lineWidth = 1;
            c.strokeStyle = "#333";
            c.stroke();
        }

        function drawTumbler(c, li, s, g) {
            const tumblerGradient = c.createRadialGradient(
                li.x, li.y, li.dialRadius, li.x, li.y, li.tumblerRadius);
            
            tumblerGradient.addColorStop(0.00, "#b0811e");
            tumblerGradient.addColorStop(0.20, "#c9982f");
            tumblerGradient.addColorStop(0.75, "#c9982f");
            tumblerGradient.addColorStop(1.00, "#b0811e");

            c.save();
            c.translate(li.x, li.y);
            c.rotate(s.tumblerAngle);

            c.beginPath();

            let curAngle = 0; 

            c.moveTo(li.tumblerRadius, 0);

            s.pinStates.forEach(p => {
                const startAngle = p.ca;
                const endAngle = startAngle + p.w;
                const cutDepth = li.tumblerRadius - p.r;
                
                c.arc(0, 0, li.tumblerRadius, curAngle, startAngle);
                c.lineTo(...pointOnCircle(0, 0, cutDepth, startAngle));
                c.arc(0, 0, cutDepth, startAngle, endAngle);
                c.lineTo(...pointOnCircle(0, 0, li.tumblerRadius, endAngle));
                
                curAngle = endAngle;
            });
            
            c.arc(0, 0, li.tumblerRadius, curAngle, 2 * Math.PI);
            c.lineTo(li.tumblerRadius - 1, 0);
            
            c.fillStyle = tumblerGradient;
            c.fill();
            
            c.strokeStyle = "rgba(255,255,255,0.25)";
            c.lineWidth = 4
            c.stroke();

            c.restore();
        }

        function pointOnCircle(x, y, r, a) {
            return [x + r * Math.cos(a), y + r * Math.sin(a)];
        }

        function drawPins(c, l, s, g) {
            s.pinStates.forEach(p => {
                p.a += s.keyPinAngleChange;

                const globalCtx = { c:c, l:l, s:s, g:g };

                drawPin(globalCtx, p);
            });
        }

        function isKeyPinInCut(keyPinAngle, tumblerAngle, matchTolerance) {
            let angleDistance = keyPinAngle - tumblerAngle;
            angleDistance = (angleDistance + Math.PI) % (Math.PI * 2);
            if (angleDistance < 0)
                angleDistance += Math.PI * 2;
            angleDistance = angleDistance - Math.PI;

            return (Math.abs(angleDistance) < matchTolerance);
        }

        function drawPin(g, pin) {
            let keyPinInnerRadius = g.l.tumblerRadius + g.l.tumblerSpacing;
            let keyPinOuterRadius = keyPinInnerRadius + pin.r - 6;

            if (pin.i) {
                keyPinInnerRadius = g.l.tumblerRadius - pin.r + 6;
                keyPinOuterRadius = g.l.tumblerRadius;

                pin.a = g.s.tumblerAngle + pin.ca;
            }

            const keyPinGradient = g.c.createRadialGradient(
                g.l.x, g.l.y,
                keyPinInnerRadius,
                g.l.x, g.l.y,
                keyPinOuterRadius);

            if (pin.m) {
                keyPinGradient.addColorStop(0.00, "#a13b2f");
            }
            else if (false) {
                keyPinGradient.addColorStop(0.00, "#d7b45a");
                keyPinGradient.addColorStop(0.50, "#f0d07a");
                keyPinGradient.addColorStop(1.00, "#d7b45a");
            }
            else {
                keyPinGradient.addColorStop(0.00, "#c0912e");
                keyPinGradient.addColorStop(0.50, "#c9982f");
                keyPinGradient.addColorStop(1.00, "#c0912e");
            }

            g.c.fillStyle = keyPinGradient;

            let startAngle = pin.a;
            let endAngle = startAngle + pin.w;

            // adjust for padding

            const paddingAngle = 1 * Math.PI / 180; // one degree
            
            if (pin.i) {
                startAngle += 3 * paddingAngle;
                endAngle -= 3 * paddingAngle;
            }
            else {
                startAngle += 5 * paddingAngle;
                endAngle -= 5 * paddingAngle;
            }
            
            g.c.beginPath();
            g.c.arc(g.l.x, g.l.y, keyPinOuterRadius, startAngle, endAngle, false);
            g.c.arc(g.l.x, g.l.y, keyPinInnerRadius, endAngle, startAngle, true);
            g.c.fill();
            g.c.lineWidth = 4;
            g.c.strokeStyle = "rgba(255,255,255,0.25)";
            g.c.closePath();
            g.c.stroke();

            if (pin == g.s.activePin && !pin.i) {
                const localCtx = { 
                    sa: startAngle,
                    ea: endAngle,
                    r: keyPinInnerRadius + (keyPinOuterRadius - keyPinInnerRadius) / 2,
                    c: "#6a4c1a"};

                drawRadialArrow(g, localCtx);
            }
        }

        function drawRadialArrow(g, l) {
            const arrowStart = l.sa + 0.08;
            const arrowEnd = l.ea - 0.08;
            const mr = l.r;
            const ir = mr - 5;
            const or = mr + 5;
            const [six, siy] = [...pointOnCircle(g.l.x, g.l.y, ir, arrowStart)];
            const [sox, soy] = [...pointOnCircle(g.l.x, g.l.y, or, arrowStart)];
            const [scx, scy] = [...pointOnCircle(g.l.x, g.l.y, mr, arrowStart - 0.05)];
            const [eix, eiy] = [...pointOnCircle(g.l.x, g.l.y, ir, arrowEnd)];
            const [eox, eoy] = [...pointOnCircle(g.l.x, g.l.y, or, arrowEnd)];
            const [ecx, ecy] = [...pointOnCircle(g.l.x, g.l.y, mr, arrowEnd + 0.05)];

            g.c.lineWidth = 2;
            g.c.strokeStyle = l.c;
            g.c.fillStyle = l.c;
            
            g.c.beginPath();
            g.c.arc(g.l.x, g.l.y, mr, arrowStart, arrowEnd);
            g.c.stroke();

            g.c.beginPath();
            g.c.moveTo(six, siy);
            g.c.lineTo(sox, soy);
            g.c.lineTo(scx, scy);
            g.c.lineTo(six, siy);
            g.c.fill();

            g.c.beginPath();
            g.c.moveTo(eix, eiy);
            g.c.lineTo(eox, eoy);
            g.c.lineTo(ecx, ecy);
            g.c.lineTo(eix, eiy);
            g.c.fill();
        }

        function drawBackground(g) {
            let gr = g.c.createLinearGradient(0, 0, 0, g.l.h);
            
            gr.addColorStop(0, "#5a3b23");
            gr.addColorStop(0.5, "#4a2f1d");
            gr.addColorStop(1, "#3a2416");
            g.c.fillStyle = gr;
            g.c.fillRect(0, 0, g.l.w, g.l.h);

            // woodgrain

            for (let i = 0; i < g.l.w; i += 10) {
                g.c.beginPath();
                g.c.moveTo(i + Math.sin(i * 0.02) * 6, 0);
                g.c.lineTo(i + Math.sin(i * 0.02) * 6, g.l.h);
                g.c.strokeStyle = "rgba(0,0,0,0.15)";
                g.c.lineWidth = 1;
                g.c.stroke();
            }

            for (let i = 0; i < g.l.w; i += 25) {
                g.c.beginPath();
                g.c.moveTo(i + Math.sin(i * 0.03) * 3, 0);
                g.c.lineTo(i + Math.sin(i * 0.03) * 3, g.l.h);
                g.c.strokeStyle = "rgba(0,0,0,0.10)";
                g.c.lineWidth = 2;
                g.c.stroke();
            }

            for (let i = 0; i < g.l.w; i += 60) {
                g.c.beginPath();
                g.c.moveTo(i + Math.sin(i * 0.01) * 10, 0);
                g.c.lineTo(i + Math.sin(i * 0.01) * 10, g.l.h);
                g.c.strokeStyle = "rgba(0,0,0,0.18)";
                g.c.lineWidth = 2;
                g.c.stroke();
            }
        }

        function drawTitlePanel(c, l, s, g) {
            const titleText = "Spinner Game";
            const textX = l.tpx;
            const textY = l.tpy;
            
            c.save();
            
            c.font = "58px Filibuster NF";
            c.textAlign = "left";
            c.textBaseline = "top";

            // burned text
            c.shadowColor = "rgba(0,0,0,0.55)";
            c.shadowBlur = 5;
            c.fillStyle = "rgba(0,0,0,0.50)";
            c.fillText(titleText, textX, textY);

            // outline
            c.lineWidth = 1;
            c.strokeStyle = "rgba(0,0,0,1)";
            c.strokeText(titleText, textX, textY);

            c.restore();
        }

        function drawText(c, t, x, y) {
            c.textBaseline = "top";
            c.font =  "16pt Cormorant Garamond";

            // burned text
            c.shadowColor = "rgba(0,0,0,0.5)";
            c.shadowBlur = 2;
            c.fillStyle = "rgba(0,0,0,0.2)";
            c.fillText(t, x, y);

            // outline
            c.lineWidth = 1;
            c.strokeStyle = "rgba(0,0,0,0.6)";
            c.strokeText(t, x, y);
        }

        function drawStatusBox(c, l, s, g) {
            const sbLeft = 10;
            const sbTop = 90;
            const sbWidth = canvas.width - 20;
            const sbHeight = 80;
            const drawInset = false;
            
            c.fillStyle = "rgba(255,255,255,0.05)";
            c.fillRect(sbLeft, sbTop, sbWidth, sbHeight);
         
            c.save();
            c.translate(sbLeft, sbTop);
            
            const line1 = "To move the pin around the tumbler";
            const line2 = "use the [Left] and [Right] keys. Press";
            const line3 = "[Up] to insert the pin into the cut."

            drawText(c, line1, 8, 5);
            drawText(c, line2, 8, 30);
            drawText(c, line3, 8, 55);

            
            c.strokeStyle = drawInset ? "rgba(0,0,0,0.7)" : "rgba(0,0,0,0.5)";
            c.lineWidth = 1;

            c.beginPath();
            c.moveTo(0, 0);            
            c.lineTo(sbWidth, 0);
            c.stroke();

            c.beginPath();
            c.moveTo(0, 0); 
            c.lineTo(0, sbHeight);
            c.stroke();

            c.strokeStyle = drawInset ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.5)";
            c.lineWidth = 1;
            
            c.beginPath();
            c.moveTo(sbWidth, 0);            
            c.lineTo(sbWidth, sbHeight);
            c.stroke();

            c.beginPath();
            c.moveTo(0, sbHeight); 
            c.lineTo(sbWidth, sbHeight);
            c.stroke();

            c.restore();
        }

        function drawButtonPanel(c, l, s, g) {
            const panelLeft = l.bpx;
            const panelTop = l.bpy;
            const panelWidth = l.bpw;
            const panelHeight = l.bph;
            const numButtons = l.buttonInfo.length;
            const buttonMargin = 10;
            const ellipsisButtonWidth = 60;
            const buttonWidth = (l.bpw - 2 * buttonMargin - 60) / (numButtons - 1);
            let buttonLeft = 0

            l.bw = buttonWidth; // FIXME

            c.save();
            c.translate(panelLeft, panelTop);

            l.buttonInfo.forEach(b => {
                b.x = buttonLeft + buttonMargin;
                b.y = 0;
                b.w = b.text == "..." ? ellipsisButtonWidth : buttonWidth;
                b.h = l.bh;

                const gr = c.createLinearGradient(0, 0, 0, b.h);

                if (b.s == "pressed") {
                    gr.addColorStop(1, "#f2d27a");
                    gr.addColorStop(0.6, "#d6a93a");
                    gr.addColorStop(0, "#a37a24");
                }
                else {
                    gr.addColorStop(0, "#a37a24");
                    gr.addColorStop(0.4, "#c99a2e");
                    gr.addColorStop(1, "#f2d27a");
                }
                

                c.fillStyle = gr;
                c.fillRect(b.x, b.y, b.w, b.h);

                if (b.s == "pressed") {
                    c.beginPath();
                    c.moveTo(b.x, b.y + 0.5);
                    c.lineTo(b.x + b.w, b.y + 0.5);
                    c.strokeStyle = "rgba(0,0,0,0.4)";
                    c.lineWidth = 1;
                    c.stroke();

                    c.beginPath();
                    c.moveTo(b.x, b.y + b.h - 0.5);
                    c.lineTo(b.x + b.w, b.y + b.h - 0.5);
                    c.strokeStyle = "rgba(255,255,255,0.4)";
                    c.lineWidth = 1;
                    c.stroke();
                }
                else {
                    c.beginPath();
                    c.moveTo(b.x, b.y + 0.5);
                    c.lineTo(b.x + b.w, b.y + 0.5);
                    c.strokeStyle = "rgba(255,255,255,0.4)";
                    c.lineWidth = 1;
                    c.stroke();

                    c.beginPath();
                    c.moveTo(b.x, b.y + b.h - 0.5);
                    c.lineTo(b.x + b.w, b.y + b.h - 0.5);
                    c.strokeStyle = "rgba(0,0,0,0.4)";
                    c.lineWidth = 1;
                    c.stroke();
                }
                

                c.save();
                c.translate(b.x, b.y);

                if (b.text == "...") {
                    drawEllipsis(c, { x: b.x, y: b.s == "pressed" ? b.y + 1 : b.y, w: b.w, h: b.h });
                }
                else {
                    drawFancyText(c, b.text, { x: b.x, y: b.s == "pressed" ? b.y + 1 : b.y, w: b.w, h: b.h });
                }

                c.restore();
                
                buttonLeft += b.w + 10;
            });
            
            c.restore();
        }

        function drawEllipsis(c, r) {
            c.font = "50px Filibuster NF";
            const ellipsisWidth = c.measureText("...").width;
            const ellipsisX = (r.w - ellipsisWidth) / 2;
            c.textBaseline = "top";
            c.fillStyle = "rgba(0,0,0,0.6)";
            c.fillText("...", ellipsisX, r.y);
        }

        function drawFancyText(c, t, r) {
            const upperCase = t[0];
            const lowerCase = t.substring(1);
            const upperFont = "50px Filibuster NF";
            const lowerFont = "25px Filibuster NF";

            c.font = upperFont;
            const tmUpper = c.measureText(upperCase);

            c.font = lowerFont;
            const tmLower = c.measureText(lowerCase);

            const textWidth = tmUpper.width + tmLower.width;
            const textX = (r.w - textWidth) / 2;
            
            c.font = upperFont;
            c.textBaseline = "middle";
            c.fillStyle = "rgba(0,0,0,0.6)";
            c.fillText(upperCase, textX, r.y + (r.h / 2) + 2);
            c.font = lowerFont;
            c.textBaseline = "top";
            c.fillText(lowerCase, textX + tmUpper.width, r.y + (r.h / 2) - 2);
        }

        function drawSpots(c, l, s) {
            c.save();
            c.translate(l.x, l.y);
            c.rotate(s.tumblerAngle);

            l.spotInfo.forEach(p => {
                c.beginPath();
                c.arc(
                    Math.cos(p.a) * p.r,
                    Math.sin(p.a) * p.r,
                    p.pr,
                    0,
                    Math.PI * 2);
                c.fillStyle = `rgba(0,0,0,${p.f})`;
                c.fill();
            });

            c.restore();
        }
        
        function drawScratches(c, l, s) {
            c.save();
            c.translate(l.x, l.y);
            c.rotate(s.tumblerAngle);

            c.strokeStyle = "rgba(0,0,0,0.05)";
            c.lineWidth = 1;
            
            l.scratchInfo.forEach(s => {
                c.beginPath();
                c.arc(0, 0, s.r, s.a, s.a + s.pa);
                c.stroke();
            });

            c.restore();
        }

        async function startGame(htmlDoc) {
            const canvas = htmlDoc.getElementById("canvas");
            const canvasCtx = canvas.getContext("2d");
            const layoutInfo = {
                c: canvasCtx,
                w: canvas.width,
                h: canvas.height,
                x: canvas.width / 2,
                y: canvas.height / 2,
                bh: 75,
                bw: 150,
                bpx: 0,
                bpy: canvas.height - 85,
                bpw: canvas.width - 20,
                bph: 85,
                tpx: 10,
                tpy: 10,
                tpw: canvas.width - 20,
                tph: 85,
                keyHoleRadius: 70,
                plugRadius: 50,
                dialRadius: 75,
                tumblerRadius: 130,
                tumblerSpacing: 10, // space between tumbler and key pin
                buttonInfo: [
                    { text: "Connect", s: "normal" },
                    { text: "Start", s: "normal" },
                    { text: "...",  s: "normal" } ],
                spotInfo: [],
                scratchInfo: [],
                plugScratchInfo: []
            };
            const gameState = {
                tumblerAngle: 0,
                lastTime: 0,
                tumblerTargetVelocity: 0,
                tumblerVelocity: 0,
                keyPinAngleChange: 0,
                setTimeout: htmlDoc.defaultView.setTimeout.bind(htmlDoc.defaultView),
                wasInserted: false,
                pinStates: [],
                resetRequested: false,
                lastLeftKeyDown: 0,
                lastRightKeyDown: 0
            };
            const keyboardState = {
                leftKeyDown: false,
                rightKeyDown: false,
                upKeyDown: false,
                downKeyDown: false,
                lastLeftKeyPress: 0,
                lastRightKeyPress: 0,
                lastUpKeyPress: 0,
                lastDownKeyPress: 0
            };
            const gameActions = {
                nudgePinL: false,
                nudgePinR: false,
                movePinL: false,
                movePinR: false,
                tryInsertPin: false,
                startTumbler: false,
                stopTumbler: false,
            };
            const gameConfig = {
                matchTolerance: (Math.PI / 180) * 5, // 5 degrees
                tumblerVelocity: 0.006283 / 2,
                tumblerAcceleration: 0.00001,
                tumblerFriction: 0.94,
                numSpots: 10,
                numScratches: 10,
                keyPins: [
                    { startDeg: 0,   widthDeg: 30, depthPx: 30 },
                    { startDeg: 45,  widthDeg: 20, depthPx: 40 },
                    { startDeg: 200, widthDeg: 50, depthPx: 20 }
                ]
            };
            const soundFactory = {
                _ctx: new AudioContext(),
                
                initBuffers: async function() {
                    this._nudgeBuf = await this._getBuf("Audio/nudge.wav");
                    this._insertBuf = await this._getBuf("Audio/insert2.wav");
                    this._rotateBuf = await this._getBuf("Audio/rotate.wav");
                    this._twistBuf = await this._getBuf("Audio/twist.wav");
                    this._errorBuf = await this._getBuf("Audio/error.wav");
                },
                _getBuf: function (localPath) {
                    return fetch(localPath)
                        .then(r => {
                            return r.arrayBuffer(); })
                        .then(d => { 
                            return this._ctx.decodeAudioData(d); });
                },
                _startBufWithFade: function(b, dur) {
                    const s = this._ctx.createBufferSource();
                    const g = this._ctx.createGain();
                    s.buffer = b;
                    s.loop = true;
                    s.connect(g);
                    g.connect(this._ctx.destination);
                    const fade = 0.01;
                    const now = this._ctx.currentTime;
                    g.gain.setValueAtTime(1, now);
                    //g.gain.setValueAtTime(1, now);
                    g.gain.linearRampToValueAtTime(0, now + dur);
                    s.start();
                },
                _startBufWithFadeOld: function(b, dur) {
                    const s = this._ctx.createBufferSource();
                    const g = this._ctx.createGain();
                    s.buffer = b;
                    s.connect(g);
                    g.connect(this._ctx.destination);
                    const fade = 0.01;
                    const now = this._ctx.currentTime;
                    g.gain.setValueAtTime(1, now);
                    g.gain.linearRampToValueAtTime(0, now + dur);
                    s.start(now, 0, dur);
                },
                _startBuf: function(b) {
                    const s = this._ctx.createBufferSource();
                    s.buffer = b;
                    s.connect(this._ctx.destination);
                    s.start();
                },

                playNudge: function() {
                    this._startBuf(this._nudgeBuf);
                },
                playInsert: function() {
                    this._startBuf(this._insertBuf);
                },
                playError: function() {
                    this._startBuf(this._errorBuf);
                },
                playRotate: function () {
                    this._startBufWithFade(this._rotateBuf, 1.0);
                }
            }

            function gameActionFromCommand(cmd) {
                switch (cmd) {
                    case "Connect":
                        connectToController();
                        break;
                    case "Start":
                        gameActions.startTumbler = true;
                        break;
                    case "Stop":
                        gameActions.stopTumbler = true;
                        break;
                    case "...":
                        gameActions.resetGame = true;
                        break;
                    default:
                        console.log("UNKNOWN ACTIION: " + cmd);
                }
            };
            const eventHandlers = {
                keyDown: (e) => {
                    if (e.key == "ArrowRight") {
                        keyboardState.rightKeyDown = true;
                    }
                    else if (e.key == "ArrowLeft") {
                        keyboardState.leftKeyDown = true;
                    }
                    else if (e.key == "ArrowUp") {
                        keyboardState.upKeyDown = true;
                    }
                    else if (e.key == "ArrowDown") {
                        keyboardState.downKeyDown = true;
                    }
                },
                keyUp: (e) => {
                    if (e.key == "ArrowRight") {
                        keyboardState.rightKeyDown = false;
                    }
                    else if (e.key == "ArrowLeft") {
                        keyboardState.leftKeyDown = false;
                    }
                    else if (e.key == "ArrowUp") {
                        keyboardState.upKeyDown = false;
                    }
                    else if (e.key == "ArrowDown") {
                        keyboardState.downKeyDown = false;
                    }
                },
                mouseMove: (e) => {
                },
                mouseDown: (e) => {
                    const buttonInfo = eventHandlers._buttonFromHtmlEvent(e);

                    if (buttonInfo) {
                        buttonInfo.s = "pressed";
                        gameState.needsRedraw = true; // FIXME
                    }
                },
                mouseUp: (e) => {
                    const buttonInfo = eventHandlers._buttonFromHtmlEvent(e);

                    if (buttonInfo) {
                        buttonInfo.s = "normal";
                        gameState.needsRedraw = true; // FIXME
                    }
                    
                },
                mouseClick: (e) => {
                    const buttonInfo = eventHandlers._buttonFromHtmlEvent(e);

                    if (buttonInfo) {
                        gameActionFromCommand(buttonInfo.text);
                    }
                },
                _buttonFromHtmlEvent: (e) => {
                    const canvasRect = canvas.getBoundingClientRect();
                    const x = e.clientX - canvasRect.left;
                    const y = e.clientY - canvasRect.top;
                    foundButton = null;
                    layoutInfo.buttonInfo.forEach(b => {
                        const bx = layoutInfo.bpx + b.x;
                        const by = layoutInfo.bpy + b.y;
                        const bw = b.w;
                        const bh = layoutInfo.bh;
                        const pointInButton = x >= bx && x <= bx + bw && y >= by && y <= by + bh;

                        if (pointInButton) {
                            foundButton = b;
                            return;
                        }
                    });
                    return foundButton;
                },
                controllerEvent: (e) => {
                    const data = e.target.value.buffer ? e.target.value : new DataView(e.target.value);
                    const button_state = {
                        left_plus: false,
                        left_stop: false,
                        left_minus: false,
                        center: false,
                        right_plus: false,
                        right_stop: false,
                        right_minus: false
                    };

                    if (data.getUint8(0) == 5) {
                        if (data.getUint8(2) == 0x08) { // LWP3_MSG_TYPE_HW_NET_CMDS
                            button_state.center = data.getUint8(4) == 1;
                        }
                    }
                    else if (data.getUint8(0) == 7) {
                        if (data.getUint8(2) == 0x45) { // LWP3_MSG_TYPE_PORT_VALUE
                            if (data.getUint8(3) == 0) { // LEFT
                                button_state.left_plus = data.getUint8(4) == 1;
                                button_state.left_stop = data.getUint8(5) == 1;
                                button_state.left_minus = data.getUint8(6) == 1;
                            }
                            else if (data.getUint8(3) == 1) { // RIGHT
                                button_state.right_plus = data.getUint8(4) == 1;
                                button_state.right_stop = data.getUint8(5) == 1;
                                button_state.right_minus = data.getUint8(6) == 1;
                            }
                        }
                    }
                    else {
                        console.log("Unhandled Event: " + data)
                    }
                    
                    if (button_state.center) {
                        gameActionFromCommand("START");
                    }

                    gameState.leftKeyDown = button_state.left_plus;
                    gameState.rightKeyDown = button_state.left_minus;
                    gameState.upKeyDown = button_state.left_stop;
                }
            };

            function initPins() {
                gameState.pinStates = [];
                gameConfig.keyPins.forEach(p => {
                    const pinState = {
                        w: p.widthDeg * Math.PI / 180,
                        a: p.startDeg * Math.PI / 180,
                        r: p.depthPx,
                        i: false };

                    pinState.ca = pinState.a;

                    gameState.pinStates.push(pinState);
                });

                gameState.pinIterator = gameState.pinStates.values();
                gameState.activePin = gameState.pinIterator.next().value;
            }

            function createParticles() {
                const createParticle = (innerRadius, outerRadius) => {
                    const r = innerRadius + Math.random() * (outerRadius - innerRadius);
                    const a = Math.random() * Math.PI * 2;
                    const pr = 2 + Math.random() * 2;
                    const pa = (Math.PI / 64) + Math.random() * 16 * (Math.PI / 64);
                    const f = 0.01 + Math.random() * 0.05;
                    const o = {r:r,a:a,pr:pr,pa:pa,f:f};
                    return o;
                };
                
                for (let i = 0; i < gameConfig.numSpots; i++) {
                    layoutInfo.spotInfo.push(createParticle(layoutInfo.keyHoleRadius, layoutInfo.tumblerRadius));
                }

                for (let i = 0; i < gameConfig.numScratches; i++) {
                    layoutInfo.scratchInfo.push(createParticle(layoutInfo.keyHoleRadius, layoutInfo.tumblerRadius));
                }

                for (let i = 0; i < gameConfig.numScratches; i++) {
                    layoutInfo.plugScratchInfo.push(createParticle(0, layoutInfo.plugRadius));
                }
            }

            function connectToController() {
                const service_uid = "00001623-1212-efde-1623-785feabcd123";
                const characteristic_uid = "00001624-1212-efde-1623-785feabcd123";
                const setup_data = new Uint8Array([10, 0, 0x41, 0, 0x04, 1, 0, 0, 0, 1]);
                
                // 10   => Size
                // 0    => Hub 0
                // 0x41 => Message Type - Port Input Format Setup (Single) [0x41]
                // 1    => BOTH BUTTONS = 1 (LEFT ONLY = 0)
                // 0x04 => REMOTE_BUTTONS_MODE_KEYSD = 4
                // 1    => DELTA_INTERVAL = 1 (4 BYTES)
                // 1    => ENABLE_NOTIFICATIONS
                
                navigator.bluetooth.requestDevice({
                    filters: [{ name: "Handset"}],
                    optionalServices: [service_uid] })
                    .then(device => device.gatt.connect())
                    .then(server => server.getPrimaryService(service_uid))
                    .then(service => service.getCharacteristic(characteristic_uid))
                    .then(characteristic => {
                        characteristic.writeValueWithResponse(setup_data)
                            .then(response => {
                                characteristic.startNotifications();
                            })
                            .then(() => {
                                characteristic.addEventListener("characteristicvaluechanged", eventHandlers.controllerEvent);
                                console.log("Subscribed via BLE");
                            })
                    })
                    .catch(e => { console.log(`(BLE) ${e}`); });
                }

            function setupEventHandlers() {
                htmlDoc.addEventListener("keydown", eventHandlers.keyDown);
                htmlDoc.addEventListener("keyup", eventHandlers.keyUp);
                htmlDoc.addEventListener("mousemove", eventHandlers.mouseMove);
                htmlDoc.addEventListener("mousedown", eventHandlers.mouseDown);
                htmlDoc.addEventListener("mouseup", eventHandlers.mouseUp);
                htmlDoc.addEventListener("click", eventHandlers.mouseClick);
            }

            function animationLoop(timeStamp) {
                const gameCtx = { s: gameState, g: gameConfig, k:keyboardState, a:gameActions, f:soundFactory };
                const drawCtx = { c: canvasCtx, l: layoutInfo, s: gameCtx.s, g: gameCtx.g }
                const ctx = { s: gameState, l: layoutInfo, f: soundFactory, c: gameConfig, k: keyboardState, a: gameActions }
                let needsRedraw = timeStamp == 0;
                
                gameState.deltaTime = timeStamp - gameState.lastTime;
                gameState.lastTime = timeStamp;
                
                needsRedraw |= handleKeyPress(gameCtx);
                needsRedraw |= handleActions(ctx);
                needsRedraw |= handleReset(gameCtx);
                needsRedraw |= handleRotation(gameCtx);
                needsRedraw |= handlePinInsertion(gameState);
                needsRedraw |= handleWinCondition(gameCtx);

                if (needsRedraw) {
                    drawFrame(drawCtx); // TODO: try to only draw tumbler and pins
                }

                gameState.keyPinAngleChange = 0;
                
                requestAnimationFrame(animationLoop);
            };

            function handleKeyPress(ctx) {
                let timeDelta = 0;
                
                // LEFT KEY
                if (ctx.k.leftKeyDown) {
                    if  (ctx.k.lastLeftKeyPress == 0) {
                        ctx.k.lastLeftKeyPress = ctx.s.lastTime;
                    }

                    timeDelta = ctx.s.lastTime - ctx.k.lastLeftKeyPress;

                    if (timeDelta == 0) {
                        ctx.a.nudgePinL = true;
                    }
                    else if (timeDelta < 250) {
                        // pause
                    }
                    else {
                        ctx.a.movePinL = true;
                    }
                }
                else if (ctx.k.lastLeftKeyPress > 0) {
                    timeDelta = ctx.s.lastTime - ctx.k.lastLeftKeyPress;
                
                    if (timeDelta < 250) {
                    // console.log("Short Press")
                    }
                    else {
                    // console.log("Long Press")
                    }

                    ctx.k.lastLeftKeyPress = 0;
                }

                // RIGHT KEY
                if (ctx.k.rightKeyDown) {
                    if  (ctx.k.lastRightKeyPress == 0) {
                        ctx.k.lastRightKeyPress = ctx.s.lastTime;
                    }

                    timeDelta = ctx.s.lastTime - ctx.k.lastRightKeyPress;

                    if (timeDelta == 0) {
                        ctx.a.nudgePinR = true;
                    }
                    else if (timeDelta < 250) {
                        // pause
                    }
                    else {
                        ctx.a.movePinR = true;
                    }
                }
                else if (ctx.k.lastRightKeyPress > 0) {
                    timeDelta = ctx.s.lastTime - ctx.k.lastRightKeyPress;
                
                    if (timeDelta < 250) {
                    // console.log("Short Press")
                    }
                    else {
                    // console.log("Long Press")
                    }

                    ctx.k.lastRightKeyPress = 0;
                }

                // UP KEY
                if (ctx.k.upKeyDown) {
                    if  (ctx.k.lastUpKeyPress == 0) {
                        ctx.k.lastUpKeyPress = ctx.s.lastTime;
                    }

                    timeDelta = ctx.s.lastTime - ctx.k.lastUpKeyPress;

                    if (timeDelta == 0) {
                        ctx.a.tryInsertPin = true;
                    }
                }
                else if (ctx.k.lastUpKeyPress > 0) {
                    ctx.k.lastUpKeyPress = 0;
                }
            }

            function handleActions(ctx) {
                let needsRedraw = false;
                let deltaChange = 0;

                if (ctx.a.nudgePinL) {
                    deltaChange = 0.005;
                }
                else if (ctx.a.nudgePinR) {
                    deltaChange = -0.005;
                }
                else if (ctx.a.movePinL) {
                    deltaChange = 0.01;
                }
                else if (ctx.a.movePinR) {
                    deltaChange = -0.01;
                }
                else if (ctx.a.tryInsertPin) {
                    return handlePinInsertionAttempt(ctx);
                }
                else if (ctx.a.startTumbler) {
                    ctx.s.tumblerTargetVelocity = ctx.c.tumblerVelocity;
                    ctx.l.buttonInfo[1].text = "Stop"; // FIXME
                    ctx.a.startTumbler = false;
                    ctx.f.playRotate();
                    return true;
                }
                else if (ctx.a.stopTumbler) {
                    ctx.s.tumblerTargetVelocity = 0;
                    ctx.l.buttonInfo[1].text = "Start"; // FIXME
                    ctx.a.stopTumbler = false;
                    return true;
                }

                if (deltaChange != 0) {
                    //ctx.f.playNudge();
                    ctx.s.keyPinAngleChange = deltaChange * Math.PI * 2;
                    ctx.a.nudgePinL = false;
                    ctx.a.nudgePinR = false;
                    ctx.a.movePinL = false;
                    ctx.a.movePinR = false;
                    needsRedraw = true;
                }

                return needsRedraw;
            }

            function handleReset(ctx) {
                if (ctx.s.resetRequested) {
                    ctx.s.tumblerAngle = 0;
                    initPins();
                    ctx.s.resetRequested = false;
                    return true;
                }

                return false;
            }

            function handleRotation(ctx) {
                // accelerate toward target velocity
                if (ctx.s.tumblerVelocity < ctx.s.tumblerTargetVelocity) {
                    // speed up
                    ctx.s.tumblerVelocity += ctx.g.tumblerAcceleration * ctx.s.deltaTime;
                }
                else if (ctx.s.tumblerVelocity > ctx.s.tumblerTargetVelocity) {
                    // slow down
                    ctx.s.tumblerVelocity *= ctx.g.tumblerFriction;
                }

                if (ctx.s.tumblerVelocity > 0) {
                    // stop when very slow
                    if (ctx.s.tumblerVelocity < 0.00001) {
                        ctx.s.tumblerVelocity = 0;
                    }
                    // update angle for drawing
                    ctx.s.tumblerAngle += ctx.s.tumblerVelocity * ctx.s.deltaTime;
                    
                    return true;
                }

                return false;
            }

            function handleWinCondition(ctx) {
                if (!ctx.s.allPinsInserted) {
                    const allPinsInserted = ctx.s.pinStates.every(p => p.i);

                    if (allPinsInserted) {
                        console.log("YOU WIN");
                       // thudSound.currentTime = 0;
                        //thudSound.play();

                        ctx.s.allPinsInserted = true;

                        return false;
                    }
                }

                return false;
            }

            function handlePinInsertion(s, g) {
                if (s.wasInserted) {console.log("wasInserted")
                    s.activePin = s.pinIterator.next().value;
                    s.wasInserted = false;
                    
                    return true;
                }

                return false;
            }

            function handlePinInsertionAttempt(ctx) {
                ctx.a.tryInsertPin = false;
                
                if (ctx.s.activePin) {
                    if (ctx.s.activePin.i) {
                        console.log("PIN ALREADY INSERTED");
                    }
                    else {
                        canInsert = isKeyPinInCut(
                            ctx.s.activePin.a,
                            ctx.s.tumblerAngle + ctx.s.activePin.ca,
                            ctx.c.matchTolerance);
                        ctx.s.activePin.i = canInsert;
                        ctx.s.activePin.a = canInsert ? ctx.s.tumblerAngle : ctx.s.activePin.a; // align if inserted
                        
                        ctx.s.wasInserted = canInsert;

                        if (!canInsert) {
                            ctx.f.playError();
                        }
                        else if (ctx.s.wasInserted) {
                            ctx.f.playInsert();
                        }

                        return ctx.s.wasInserted;
                    }
                }

                return false;
            }

            function drawFrame(globalCtx) {
                drawBackground(globalCtx);
                drawTitlePanel(canvasCtx, layoutInfo, gameState);
                drawStatusBox(canvasCtx, layoutInfo, gameState);
                drawTumbler(canvasCtx, layoutInfo, gameState, gameConfig);
                drawScratches(canvasCtx, layoutInfo, gameState);
                drawSpots(canvasCtx, layoutInfo, gameState);
                drawDial(canvasCtx, layoutInfo, gameState);
                drawKeyHole(canvasCtx, layoutInfo, gameState);
                drawPins(canvasCtx, layoutInfo, gameState, gameConfig)
                drawButtonPanel(canvasCtx, layoutInfo, gameState, gameConfig);
            }

            // game starts here
            
            soundFactory.initBuffers();
            initPins();
            createParticles();
            setupEventHandlers();
            animationLoop(0);
        }

        startGame(document);
    </script>
