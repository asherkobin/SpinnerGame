<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="utf-8"/>
        <title>Sandbox</title>
    </head>
    <style>
        .button {
            background-color: #404040;
            color: lightgray;
            padding: 15px 32px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            transition: background-color 0.3s ease;
            display: none;
        }
        .button:hover {
            background-color: #606060; 
        }
        .button:active {
            background-color: #808080;
        }
        canvas {
            display: block;
            border: 1px solid black;
        }
        body {
            background-color: black;
        }
    </style>
    <body>
        <button id="button" class="button">Connect to Controller</button>
        <canvas id="canvas" width="350" height="640"></canvas>
    </body>
    <script>
        function drawLockFace(c, li, s) {
            c.save();
            c.translate(li.x, li.y);
            
            // background
            let bgGradient = c.createRadialGradient(0, 0, li.r * 0.3, 0, 0, li.r);

            bgGradient.addColorStop(0, "#f6d57a");  // light brass
            bgGradient.addColorStop(0.5, "#d4a73b");
            bgGradient.addColorStop(1, "#8c6b1f");  // dark brass edge

            c.beginPath();
            c.arc(0, 0, li.r, 0, Math.PI * 2);
            c.fillStyle = bgGradient;
            c.fill();
            
            c.lineWidth = li.r * 0.05;
            c.strokeStyle = "#6f5418";
            c.stroke();
            
            // plug
            let plugRadius = li.r * 0.70;
            let plugGradient = c.createRadialGradient(0, 0, 0, 0, 0, plugRadius);
            
            plugGradient.addColorStop(0, "#f1c861");
            plugGradient.addColorStop(0.7, "#c9982f");
            plugGradient.addColorStop(1, "#7a5c1a");

            c.beginPath();
            c.arc(0, 0, plugRadius, 0, Math.PI * 2);
            c.fillStyle = plugGradient;
            c.fill();

            c.lineWidth = li.r * 0.02;
            c.strokeStyle = "#5f4714";
            c.stroke();

            // tick marks
            let tickCount = 12;

            c.save();
            c.rotate(s.tumblerAngle);
            
            for (let i = 0; i < tickCount; i++) {
                let tickAngle = (i / tickCount) * 2 * Math.PI;
                let innerRadius = li.r * 0.85;
                let outerRadius = li.r * 0.95;

                c.save();
                c.rotate(tickAngle);
                c.beginPath();
                c.moveTo(0, innerRadius);
                c.lineTo(0, outerRadius);
                c.strokeStyle = "#6e5418";
                c.lineWidth = li.r * 0.015;
                c.stroke();
                c.restore();
            }

            c.restore();

            // keyway
            
            c.save();
            c.translate(-8, -38); // convert to percentage
            c.scale(0.7, 0.7)
            drawKeyway(c, li);
            c.restore();

            c.restore();
        }

        function drawKeyway(c, li) {
            c.beginPath();

            c.moveTo(0, 0);
            c.lineTo(15, 0);
            c.lineTo(15, 50);
            c.lineTo(25, 60);
            c.lineTo(25, 70);
            c.lineTo(15, 75);
            c.lineTo(15, 85);
            c.lineTo(25, 85);
            c.lineTo(25, 110);
            c.lineTo(0, 110);
            c.lineTo(0, 65);
            c.lineTo(5, 65);
            c.lineTo(5, 55);
            c.lineTo(0, 50);
            c.lineTo(0, 0);

            c.lineWidth = 2;
            c.strokeStyle = "black";
            c.stroke();

            c.fillStyle = "#1a1a1a";
            c.fill();

            c.lineWidth = li.r * 0.01;
            c.strokeStyle = "#333";
            c.stroke();
        }

        function drawSpacingDisc(c, li, s) {
            const startAngle = s.tumblerAngle + li.pw / 2 - li.pp;
            const endAngle = startAngle + (2 * Math.PI - li.pw - 2 * li.pp);
            const outerRadius = li.r + li.t - li.pt - 10;
            const innerRadius = li.r;

            c.beginPath();
            c.arc(li.x, li.y, outerRadius, 0, Math.PI * 2, false);
            c.arc(li.x, li.y, innerRadius, 0, Math.PI * 2, true);
            c.closePath();
            
            const tumblerGradient = c.createRadialGradient(li.x, li.y, li.r, li.x, li.y, li.r + li.t);
            
            tumblerGradient.addColorStop(0, "#c9982f");
            tumblerGradient.addColorStop(1, "#7a5c1a");

            c.fillStyle = tumblerGradient;
            c.fill();

            c.beginPath();
            c.arc(li.x, li.y, outerRadius, endAngle, startAngle);
            c.lineWidth = 2;
            c.strokeStyle = "#5f4714";
            c.stroke();
        }

        function drawTumbler(c, li, s) {
            const startAngle = s.tumblerAngle + li.pw / 2 - li.pp;
            const endAngle = startAngle + (2 * Math.PI - li.pw - 2 * li.pp);
            const outerRadius = li.r + li.t
            const innerRadius = li.r;

            c.beginPath();
            c.arc(li.x, li.y, outerRadius, startAngle, endAngle, false);
            c.arc(li.x, li.y, innerRadius, endAngle, startAngle, true);
            c.closePath();
            
            c.lineWidth = 2;
            c.strokeStyle = "#5f4714";
            c.stroke();

            const tumblerGradient = c.createRadialGradient(li.x, li.y, li.r, li.x, li.y, li.r + li.t);
            
            tumblerGradient.addColorStop(0, "#c9982f");
            tumblerGradient.addColorStop(1, "#7a5c1a");

            c.fillStyle = tumblerGradient;
            c.fill();
           
            c.beginPath();
            c.arc(li.x, li.y, li.r + li.t + 1, startAngle, endAngle);
            c.lineWidth = 4;
            c.strokeStyle = "rgba(255,255,255,0.25)";
            c.stroke();
        }

        function drawKeyPin(c, li, s, g) { 
            let keyPinInnerRadius = li.r + li.t + li.s;
            let keyPinOuterRadius = keyPinInnerRadius + li.pt + 3;
            let keyPinMiss = false;

            if (s.upKeyDown) {
                if (!s.keyPinInCut) {
                    let angleDistance = s.keyPinAngle - s.tumblerAngle;
                    angleDistance = (angleDistance + Math.PI) % (Math.PI * 2);
                    if (angleDistance < 0)
                        angleDistance += Math.PI * 2;
                    angleDistance = angleDistance - Math.PI;

                    if (Math.abs(angleDistance) < g.matchTolerance) {
                        s.keyPinInCut = true;
                    }
                    else {
                        keyPinMiss = true;
                    }
                }
                else {
                    s.keyPinInCut = false;
                }

                s.upKeyDown = false;
            }

            if (s.downKeyDown && s.keyPinInCut) {
                s.keyPinInCut = false;
                s.keyPinAngle = s.tumblerAngle;
            }

            if (s.leftKeyDown) {
                s.keyPinAngle = s.keyPinAngle + 0.01 * Math.PI * 2;
            }
            else if (s.rightKeyDown) {    
                s.keyPinAngle = s.keyPinAngle - 0.01 * Math.PI * 2;
            }

            if (s.keyPinInCut) {
                keyPinOuterRadius = li.r + li.t;
                keyPinInnerRadius = keyPinOuterRadius - li.pt - 4;
                
                s.keyPinAngle = s.tumblerAngle;
            }

            if (keyPinMiss) {
                fillColor = "red";
            }
            else if (s.keyPinInCut) {
                fillColor = "green";
            }
            else {
                fillColor = "yellow";
            }

            const keyPinGradient = c.createRadialGradient(li.x, li.y, li.r, li.x, li.y, keyPinOuterRadius);
            
            keyPinGradient.addColorStop(0, "#c9982f");
            keyPinGradient.addColorStop(1, "#7a5c1a");

            c.fillStyle = keyPinGradient;

            let startAngle = s.keyPinAngle - li.pw / 2;
            let endAngle = startAngle + li.pw - 4 * li.pp;
            
            c.beginPath();
            c.arc(li.x, li.y, keyPinOuterRadius, startAngle, endAngle, false);
            c.arc(li.x, li.y, keyPinInnerRadius, endAngle, startAngle, true);
            c.fill();
            c.lineWidth = 4;
            c.strokeStyle = "rgba(255,255,255,0.25)";
            c.closePath();
            c.stroke();
            
        }

        function drawBackground(c, li, s) {
            let g = c.createLinearGradient(0, 0, 0, li.h);
            
            g.addColorStop(0, "#5a3b23");
            g.addColorStop(0.5, "#4a2f1d");
            g.addColorStop(1, "#3a2416");
            c.fillStyle = g;
            c.fillRect(0, 0, li.w, li.h);

            // woodgrain

            for (let i = 0; i < li.w; i += 10) {
                c.beginPath();
                c.moveTo(i + Math.sin(i * 0.02) * 6, 0);
                c.lineTo(i + Math.sin(i * 0.02) * 6, li.h);
                c.strokeStyle = "rgba(0,0,0,0.15)";
                c.lineWidth = 1;
                c.stroke();
            }

            for (let i = 0; i < li.w; i += 25) {
                c.beginPath();
                c.moveTo(i + Math.sin(i * 0.03) * 3, 0);
                c.lineTo(i + Math.sin(i * 0.03) * 3, li.h);
                c.strokeStyle = "rgba(0,0,0,0.10)";
                c.lineWidth = 2;
                c.stroke();
            }

            for (let i = 0; i < li.w; i += 60) {
                c.beginPath();
                c.moveTo(i + Math.sin(i * 0.01) * 10, 0);
                c.lineTo(i + Math.sin(i * 0.01) * 10, li.h);
                c.strokeStyle = "rgba(0,0,0,0.18)";
                c.lineWidth = 2;
                c.stroke();
            }

            // darkening around spinner

            g = c.createRadialGradient(li.x, li.y, li.r * 0.5, li.x, li.y, li.r * 2.2);

            g.addColorStop(0, "rgba(0,0,0,0.15)");
            g.addColorStop(1, "rgba(0,0,0,0)");

            c.fillStyle = g;
            c.fillRect(0, 0, li.w, li.h);

            // shadow below spinner

            g = c.createRadialGradient(li.x, li.y + li.r * 0.5, li.r * 0.2, li.x, li.y + li.r * 0.5, li.r * 2.5);

            g.addColorStop(0, "rgba(0,0,0,0.15)");
            g.addColorStop(0.5, "rgba(0,0,0,0.3)");
            g.addColorStop(1, "rgba(0,0,0,0)");
            c.fillStyle = g;
            c.fillRect(0, 0, li.w, li.h);
        }

        function drawTitlePanel(c, l, s, g) {
            const titleText = "Spinner Game";
            const textX = l.tpx;
            const textY = l.tpy;
            
            c.save();
            
            c.font = "58px Filibuster NF";
            c.textAlign = "left";
            c.textBaseline = "top";

            // burned text
            c.shadowColor = "rgba(0,0,0,0.55)";
            c.shadowBlur = 16;
            c.fillStyle = "rgba(0,0,0,0.50)";
            c.fillText(titleText, textX, textY);

            // outline
            c.lineWidth = 1;
            c.strokeStyle = "rgba(0,0,0,1)";
            c.strokeText(titleText, textX, textY);

            c.restore();
        }

        function drawButtonPanel(c, l, s, g) {
            const panelLeft = l.bpx;
            const panelTop = l.bpy;
            const panelWidth = l.bpw;
            const panelHeight = l.bph;
            const numButtons = l.buttonInfo.length;
            const buttonMargin = 10;
            const ellipsisButtonWidth = 60;
            const buttonWidth = (l.bpw - 2 * buttonMargin - 60) / (numButtons - 1);
            let buttonLeft = 0

            l.bw = buttonWidth; // FIXME

            c.save();
            c.translate(panelLeft, panelTop);

            l.buttonInfo.forEach(b => {
                b.x = buttonLeft + buttonMargin;
                b.y = 0;
                b.w = b.text == "..." ? ellipsisButtonWidth : buttonWidth;
                b.h = l.bh;

                const gr = c.createLinearGradient(0, 0, 0, b.h);

                if (b.s == "pressed") {
                    gr.addColorStop(1, "#f2d27a");
                    gr.addColorStop(0.6, "#d6a93a");
                    gr.addColorStop(0, "#a37a24");
                }
                else {
                    gr.addColorStop(0, "#a37a24");
                    gr.addColorStop(0.4, "#c99a2e");
                    gr.addColorStop(1, "#f2d27a");
                }
                

                c.fillStyle = gr;
                c.fillRect(b.x, b.y, b.w, b.h);

                if (b.s == "pressed") {
                    c.beginPath();
                    c.moveTo(b.x, b.y + 0.5);
                    c.lineTo(b.x + b.w, b.y + 0.5);
                    c.strokeStyle = "rgba(0,0,0,0.4)";
                    c.lineWidth = 1;
                    c.stroke();

                    c.beginPath();
                    c.moveTo(b.x, b.y + b.h - 0.5);
                    c.lineTo(b.x + b.w, b.y + b.h - 0.5);
                    c.strokeStyle = "rgba(255,255,255,0.4)";
                    c.lineWidth = 1;
                    c.stroke();
                }
                else {
                    c.beginPath();
                    c.moveTo(b.x, b.y + 0.5);
                    c.lineTo(b.x + b.w, b.y + 0.5);
                    c.strokeStyle = "rgba(255,255,255,0.4)";
                    c.lineWidth = 1;
                    c.stroke();

                    c.beginPath();
                    c.moveTo(b.x, b.y + b.h - 0.5);
                    c.lineTo(b.x + b.w, b.y + b.h - 0.5);
                    c.strokeStyle = "rgba(0,0,0,0.4)";
                    c.lineWidth = 1;
                    c.stroke();
                }
                

                c.save();
                c.translate(b.x, b.y);

                if (b.text == "...") {
                    drawEllipsis(c, { x: b.x, y: b.s == "pressed" ? b.y + 1 : b.y, w: b.w, h: b.h });
                }
                else {
                    drawFancyText(c, b.text, { x: b.x, y: b.s == "pressed" ? b.y + 1 : b.y, w: b.w, h: b.h });
                }

                c.restore();
                
                buttonLeft += b.w + 10;
            });
            
            c.restore();
        }

        function drawEllipsis(c, r) {
            c.font = "50px Filibuster NF";
            const ellipsisWidth = c.measureText("...").width;
            const ellipsisX = (r.w - ellipsisWidth) / 2;
            c.textBaseline = "top";
            c.fillStyle = "rgba(0,0,0,0.6)";
            c.fillText("...", ellipsisX, r.y);
        }

        function drawFancyText(c, t, r) {
            const upperCase = t[0];
            const lowerCase = t.substring(1);
            const upperFont = "50px Filibuster NF";
            const lowerFont = "25px Filibuster NF";

            c.font = upperFont;
            const tmUpper = c.measureText(upperCase);

            c.font = lowerFont;
            const tmLower = c.measureText(lowerCase);

            const textWidth = tmUpper.width + tmLower.width;
            const textX = (r.w - textWidth) / 2;
            
            c.font = upperFont;
            c.textBaseline = "middle";
            c.fillStyle = "rgba(0,0,0,0.6)";
            c.fillText(upperCase, textX, r.y + (r.h / 2) + 2);
            c.font = lowerFont;
            c.textBaseline = "top";
            c.fillText(lowerCase, textX + tmUpper.width, r.y + (r.h / 2) - 2);
        }

        function startGame(htmlDoc) {
            const canvas = htmlDoc.getElementById("canvas");
            const canvasContext = canvas.getContext("2d");
            const layoutInfo = {
                w: canvas.width,
                h: canvas.height,
                x: canvas.width / 2,
                y: canvas.height / 2,
                r: 75,
                t: 60,
                s: 10,                   // space between tumbler and key pin
                pt: 20,                  // key pin thinkness
                pw: 25 * Math.PI / 180,  // key pin width
                pp: 1 * Math.PI / 180,   // key pin padding
                bh: 75,
                bw: 150,
                bpx: 0,
                bpy: canvas.height - 85,
                bpw: canvas.width - 20,
                bph: 85,
                tpx: 10,
                tpy: 10,
                tpw: canvas.width - 20,
                tph: 85,
                buttonInfo: [
                    { text: "Connect", s: "normal" },
                    { text: "Start", s: "normal" },
                    { text: "...",  s: "normal" } ]
            };
            const gameState = {
                tumblerAngle: 0,
                keyPinAngle: 0,
                keyPinInCut: false,
                rightKeyDown: false,
                leftKeyDown: false,
                upKeyDown: false,
                downKeyDown: false,
                lastTime: 0,
                needsRedraw: true,
                tumblerTargetVelocity: 0,
                tumblerVelocity: 0
            };
            const gameConfig = {
                matchTolerance: (Math.PI / 180) * 15, // degrees
                tumblerVelocity:  0.003,
                tumblerAcceleration: 0.000002,
                tumblerFriction: 0.94
            };
            const animationLoop = (timeStamp) => {
                const deltaTime = timeStamp - gameState.lastTime;
                
                gameState.lastTime = timeStamp;

                // accelerate toward target velocity
                if (gameState.tumblerVelocity < gameState.tumblerTargetVelocity) {
                    // speed up
                    gameState.tumblerVelocity += gameConfig.tumblerAcceleration * deltaTime;
                }
                else if (gameState.tumblerVelocity > gameState.tumblerTargetVelocity) {
                    // slow down
                    gameState.tumblerVelocity *= gameConfig.tumblerFriction;
                }

                if (gameState.tumblerVelocity > 0) {
                    // stop when very slow
                    if (gameState.tumblerVelocity < 0.00001) {
                        gameState.tumblerVelocity = 0;
                    }
                    // update angle for drawing
                    gameState.tumblerAngle += gameState.tumblerVelocity * deltaTime;
                    gameState.needsRedraw = true;
                }

                drawFrame();
                requestAnimationFrame(animationLoop);
            }
            const gameAction = (cmd) => {
                switch (cmd) {
                    case "Connect":
                        connectToController();
                        break;
                    case "Start":
                        gameState.tumblerTargetVelocity = gameConfig.tumblerVelocity;
                        layoutInfo.buttonInfo[1].text = "Stop"; // FIXME
                        break;
                    case "Stop":
                        gameState.tumblerTargetVelocity = 0;
                        layoutInfo.buttonInfo[1].text = "Start"; // FIXME
                        break;
                    case "...":
                        console.log("... NYI");
                        break;
                    default:
                        console.log("UNKNOWN ACTIION: " + cmd);
                }
            }
            const eventHandlers = {
                keyDown: (e) => {
                    if (e.key == "ArrowRight") {
                        gameState.rightKeyDown = true;
                    }
                    else if (e.key == "ArrowLeft") {
                        gameState.leftKeyDown = true;
                    }
                    else if (e.key == "ArrowUp") {
                        gameState.upKeyDown = true;
                    }
                    else if (e.key == "ArrowDown") {
                        gameState.downKeyDown = true;
                    }

                    gameState.needsRedraw = true;
                },
                keyUp: (e) => {
                    if (e.key == "ArrowRight") {
                        gameState.rightKeyDown = false;
                    }
                    else if (e.key == "ArrowLeft") {
                        gameState.leftKeyDown = false;
                    }
                    else if (e.key == "ArrowUp") {
                        gameState.upKeyDown = false;
                    }
                    else if (e.key == "ArrowDown") {
                        gameState.downKeyDown = false;
                    }
                },
                mouseMove: (e) => {
                },
                mouseDown: (e) => {
                    const buttonInfo = eventHandlers._buttonFromHtmlEvent(e);

                    if (buttonInfo) {
                        buttonInfo.s = "pressed";
                        gameState.needsRedraw = true;
                    }
                },
                mouseUp: (e) => {
                    const buttonInfo = eventHandlers._buttonFromHtmlEvent(e);

                    if (buttonInfo) {
                        buttonInfo.s = "normal";
                        gameState.needsRedraw = true;
                    }
                    
                },
                mouseClick: (e) => {
                    const buttonInfo = eventHandlers._buttonFromHtmlEvent(e);

                    if (buttonInfo) {
                        gameAction(buttonInfo.text);
                    }
                },
                _buttonFromHtmlEvent: (e) => {
                    const canvasRect = canvas.getBoundingClientRect();
                    const x = e.clientX - canvasRect.left;
                    const y = e.clientY - canvasRect.top;
                    foundButton = null;
                    layoutInfo.buttonInfo.forEach(b => {
                        const bx = layoutInfo.bpx + b.x;
                        const by = layoutInfo.bpy + b.y;
                        const bw = b.w;
                        const bh = layoutInfo.bh;
                        const pointInButton = x >= bx && x <= bx + bw && y >= by && y <= by + bh;

                        if (pointInButton) {
                            foundButton = b;
                            return;
                        }
                    });
                    return foundButton;
                },
                controllerEvent: (e) => {
                    const data = e.target.value.buffer ? e.target.value : new DataView(e.target.value);
                    const button_state = {
                        left_plus: false,
                        left_stop: false,
                        left_minus: false,
                        center: false,
                        right_plus: false,
                        right_stop: false,
                        right_minus: false
                    };

                    if (data.getUint8(0) == 5) {
                        if (data.getUint8(2) == 0x08) { // LWP3_MSG_TYPE_HW_NET_CMDS
                            button_state.center = data.getUint8(4) == 1;
                        }
                    }
                    else if (data.getUint8(0) == 7) {
                        if (data.getUint8(2) == 0x45) { // LWP3_MSG_TYPE_PORT_VALUE
                            if (data.getUint8(3) == 0) { // LEFT
                                button_state.left_plus = data.getUint8(4) == 1;
                                button_state.left_stop = data.getUint8(5) == 1;
                                button_state.left_minus = data.getUint8(6) == 1;
                            }
                            else if (data.getUint8(3) == 1) { // RIGHT
                                button_state.right_plus = data.getUint8(4) == 1;
                                button_state.right_stop = data.getUint8(5) == 1;
                                button_state.right_minus = data.getUint8(6) == 1;
                            }
                        }
                    }
                    else {
                        console.log("Unhandled Event: " + data)
                    }
                    
                    if (button_state.center) {
                        gameAction("START");
                    }

                    gameState.leftKeyDown = button_state.left_plus;
                    gameState.rightKeyDown = button_state.left_minus;
                    gameState.upKeyDown = button_state.left_stop;
                }
            };

            function connectToController() {
                const service_uid = "00001623-1212-efde-1623-785feabcd123";
                const characteristic_uid = "00001624-1212-efde-1623-785feabcd123";
                const setup_data = new Uint8Array([10, 0, 0x41, 0, 0x04, 1, 0, 0, 0, 1]);
                
                // 10   => Size
                // 0    => Hub 0
                // 0x41 => Message Type - Port Input Format Setup (Single) [0x41]
                // 1    => BOTH BUTTONS = 1 (LEFT ONLY = 0)
                // 0x04 => REMOTE_BUTTONS_MODE_KEYSD = 4
                // 1    => DELTA_INTERVAL = 1 (4 BYTES)
                // 1    => ENABLE_NOTIFICATIONS
                
                navigator.bluetooth.requestDevice({
                    filters: [{ name: "Handset"}],
                    optionalServices: [service_uid] })
                    .then(device => device.gatt.connect())
                    .then(server => server.getPrimaryService(service_uid))
                    .then(service => service.getCharacteristic(characteristic_uid))
                    .then(characteristic => {
                        characteristic.writeValueWithResponse(setup_data)
                            .then(response => {
                                characteristic.startNotifications();
                            })
                            .then(() => {
                                characteristic.addEventListener("characteristicvaluechanged", eventHandlers.controllerEvent);
                                console.log("Subscribed via BLE");
                            })
                    })
                    .catch(e => { console.log(`(BLE) ${e}`); });
                }

            htmlDoc.addEventListener("keydown", eventHandlers.keyDown);
            htmlDoc.addEventListener("keyup", eventHandlers.keyUp);
            htmlDoc.addEventListener("mousemove", eventHandlers.mouseMove);
            htmlDoc.addEventListener("mousedown", eventHandlers.mouseDown);
            htmlDoc.addEventListener("mouseup", eventHandlers.mouseUp);
            htmlDoc.addEventListener("click", eventHandlers.mouseClick);

            const drawFrame = () => {
                if (gameState.needsRedraw) {
                    drawBackground(canvasContext, layoutInfo, gameState);
                    drawTitlePanel(canvasContext, layoutInfo, gameState);
                    drawLockFace(canvasContext, layoutInfo, gameState);
                    drawTumbler(canvasContext, layoutInfo, gameState);
                    drawSpacingDisc(canvasContext, layoutInfo, gameState);
                    drawKeyPin(canvasContext, layoutInfo, gameState, gameConfig);
                    drawButtonPanel(canvasContext, layoutInfo, gameState, gameConfig);
                    gameState.needsRedraw = false;
                }
            }

            animationLoop(0);
        }

        startGame(document);
    </script>
